name: Backend quality gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mutux_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mutux_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mutux_test?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mutux_test?schema=public
      JWT_SECRET: ci-integration-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run test:cov -- --runInBand
      - run: npm run test:http -- --runInBand
      - run: npm run test:integration
      - run: npm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage
          if-no-files-found: ignore
